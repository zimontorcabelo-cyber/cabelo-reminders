<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CABELO | תזכורות לקוחות לא פעילים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
 
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #f0ede8;
    --text2: #9a9590;
    --red: #e05555;
    --orange: #e08840;
    --yellow: #c9a930;
    --green: #5ba05b;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
 
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
 
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }
 
  .header-info {
    display: flex;
    gap: 24px;
    align-items: center;
  }
 
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text2);
  }
 
  .stat-chip span {
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    margin-right: 4px;
  }
 
  .update-date {
    font-size: 12px;
    color: var(--text2);
  }
 
  main {
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
 
  .page-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
 
  .page-subtitle {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 28px;
  }
 
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
 
  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
 
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }
 
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    color: var(--text2);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
 
  .count-label {
    margin-right: auto;
    color: var(--text2);
    font-size: 13px;
  }
 
  .count-label strong { color: var(--accent); }
 
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
 
  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
 
  thead th {
    padding: 14px 16px;
    text-align: right;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
 
  thead th.sort-col { cursor: pointer; }
  thead th.sort-col:hover { color: var(--accent); }
 
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
 
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
 
  tbody td {
    padding: 13px 16px;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
  }
 
  .name-cell {
    font-weight: 600;
    color: var(--text);
  }
 
  .phone-cell {
    color: var(--text2);
    font-size: 13px;
    direction: ltr;
    text-align: right;
  }
 
  .phone-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
  }
 
  .phone-link:hover { text-decoration: underline; }
 
  .days-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
 
  .days-critical { background: rgba(224,85,85,0.15); color: var(--red); border: 1px solid rgba(224,85,85,0.3); }
  .days-high     { background: rgba(224,136,64,0.15); color: var(--orange); border: 1px solid rgba(224,136,64,0.3); }
  .days-medium   { background: rgba(201,169,48,0.15); color: var(--yellow); border: 1px solid rgba(201,169,48,0.3); }
  .days-low      { background: rgba(91,160,91,0.15); color: var(--green); border: 1px solid rgba(91,160,91,0.3); }
 
  .visits-cell {
    color: var(--text2);
    font-size: 13px;
  }
 
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(37,211,102,0.12);
    border: 1px solid rgba(37,211,102,0.3);
    color: #25d366;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .wa-btn:hover { background: rgba(37,211,102,0.2); }
 
  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--text2);
    font-size: 15px;
  }
 
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
 
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text2);
  }
 
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
 
  .dot-critical { background: var(--red); }
  .dot-high { background: var(--orange); }
  .dot-medium { background: var(--yellow); }
  .dot-low { background: var(--green); }
 
  @media (max-width: 768px) {
    main { padding: 16px; }
    header { padding: 16px; }
    .header-info { gap: 12px; }
    tbody td { font-size: 13px; padding: 10px 12px; }
  }
</style>
</head>

    </thead>
    <tbody id="table-body"></tbody>
  </table>
</main>

let currentFilter = 'all';
let currentSort = { col: 'days_inactive', dir: -1 };
let filtered = [...DATA];
 
function getDayClass(d) {
  if (d >= 180) return 'days-critical';
  if (d >= 90)  return 'days-high';
  if (d >= 60)  return 'days-medium';
  return 'days-low';
}
 
function waLink(phone, name) {
  if (!phone) return '<span style="color:var(--text2);font-size:12px">—</span>';
  const text = encodeURIComponent(`היי ${name} 😊 כאן CABELO, שמנו לב שלא ראינו אותך זמן מה – נשמח לקבוע תור ולחדש! 💙`);
  const num = phone.replace(/^0/, '972');
  return `<a class="wa-btn" href="https://wa.me/${num}?text=${text}" target="_blank">📲 WhatsApp</a>`;
}
 
function render() {
  const search = document.getElementById('search').value.trim().toLowerCase();
  
  filtered = DATA.filter(c => {
    const matchSearch = !search || c.name.toLowerCase().includes(search) || c.phone.includes(search);
    let matchFilter = true;
    if (currentFilter === 'critical') matchFilter = c.days_inactive >= 180;
    else if (currentFilter === 'high')     matchFilter = c.days_inactive >= 90 && c.days_inactive < 180;
    else if (currentFilter === 'medium')   matchFilter = c.days_inactive >= 60 && c.days_inactive < 90;
    else if (currentFilter === 'low')      matchFilter = c.days_inactive >= 30 && c.days_inactive < 60;
    return matchSearch && matchFilter;
  });
 
  filtered.sort((a, b) => {
    const av = a[currentSort.col], bv = b[currentSort.col];
    if (typeof av === 'string') return currentSort.dir * av.localeCompare(bv);
    return currentSort.dir * (av - bv);
  });
 
  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">לא נמצאו לקוחות</div></td></tr>`;
  } else {
    tbody.innerHTML = filtered.map((c, i) => `
      <tr>
        <td style="color:var(--text2);font-size:12px">${i + 1}</td>
        <td class="name-cell">${c.name}</td>
        <td class="phone-cell">${c.phone ? `<a class="phone-link" href="tel:${c.phone}">${c.phone}</a>` : '—'}</td>
        <td>${c.last_visit}</td>
        <td><span class="days-badge ${getDayClass(c.days_inactive)}">${c.days_inactive} ימים</span></td>
        <td class="visits-cell">${c.visits}</td>
        <td>${waLink(c.phone, c.name)}</td>
      </tr>
    `).join('');
  }
 
  document.getElementById('visible-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = DATA.length;
}
 
function filterTable() { render(); }
 
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
 
function sortBy(col) {
  if (currentSort.col === col) currentSort.dir *= -1;
  else { currentSort.col = col; currentSort.dir = -1; }
  render();
}
 
render();
</script>
