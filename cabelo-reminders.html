<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CABELO — ניהול לקוחות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c9a96e;
    --accent2: #e8c98a;
    --text: #f0ede8;
    --text-muted: #888;
    --whatsapp: #25d366;
    --whatsapp-dark: #1da851;
    --sent: #2e7d4f;
    --danger: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Heebo", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 22px; font-weight: 900; letter-spacing: 4px; color: var(--accent); }
  .subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .tab {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 700;
    font-family: "Heebo", sans-serif;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-badge {
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    margin-right: 6px;
  }

  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Stats */
  .stats-bar { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* Cards */
  .section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card::before {
    content: "";
    position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  }
  .card.reminder::before { background: var(--accent); opacity: 0.6; }
  .card.inactive::before { background: var(--danger); opacity: 0.7; }
  .card.sent::before { background: var(--whatsapp); opacity: 1; }
  .card:hover { border-color: var(--accent); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .client-name { font-size: 15px; font-weight: 700; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .badge.danger { color: var(--danger); border-color: var(--danger); }
  .badge.accent { color: var(--accent); }

  .card-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .meta-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

  .msg-preview {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 12px; color: var(--text-muted); line-height: 1.7;
    margin-bottom: 10px; white-space: pre-wrap;
  }

  .btn-send {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--whatsapp); color: #fff; border: none; padding: 11px;
    border-radius: 9px; font-size: 13px; font-weight: 700; font-family: "Heebo", sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-send:hover { background: var(--whatsapp-dark); transform: translateY(-1px); }
  .btn-send.sent-btn { background: var(--sent); cursor: default; }
  .btn-send.sent-btn:hover { transform: none; }

  /* Auth */
  .auth-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; text-align: center; margin-bottom: 20px; }
  .auth-section h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--accent); }
  .auth-section p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
  .btn-auth {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--accent); color: #000; border: none; padding: 12px 24px;
    border-radius: 10px; font-size: 14px; font-weight: 700; font-family: "Heebo", sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-auth:hover { background: var(--accent2); }

  /* Date row */
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .date-label { font-size: 13px; color: var(--text-muted); }
  .date-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 9px; font-size: 13px; font-family: "Heebo", sans-serif; direction: ltr; flex: 1; }
  .date-input:focus { outline: none; border-color: var(--accent); }
  .btn-load { background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); padding: 8px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: "Heebo", sans-serif; cursor: pointer; transition: all 0.2s; }
  .btn-load:hover { background: var(--accent); color: #000; }

  /* Search */
  .search-row { margin-bottom: 16px; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 10px; font-size: 13px; font-family: "Heebo", sans-serif;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  /* Loading / empty */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 40px; text-align: center; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--whatsapp); color: #fff; padding: 10px 22px; border-radius: 10px; font-size: 13px; font-weight: 600; transition: transform 0.3s; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

  s.src = 'https://accounts.google.com/gsi/client';
  s.async = true;
  s.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({

      scope: SCOPES,

        accessToken = resp.access_token;
        loadAppointments();
      }
    });
  };
  document.head.appendChild(s);
}

function loginGoogle() {
  if (tokenClient) tokenClient.requestAccessToken({prompt: ''});
}

function getTargetDate() {
  if (selectedDate) return new Date(selectedDate);
  const d = new Date();
  d.setDate(d.getDate() + DAYS_AHEAD);
  return d;
}

function formatDateHE(dateStr) {
  const d = new Date(dateStr);
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `יום ${days[d.getDay()]}, ${d.getDate()} ב${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit', hour12:false});
}

async function loadAppointments() {
  document.getElementById('reminders-app').innerHTML = '<div class="loading"><div class="spinner"></div><div>טוען תורים...</div></div>';
  const target = getTargetDate();
  const start = new Date(target); start.setHours(0,0,0,0);
  const end = new Date(target); end.setHours(23,59,59,999);
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=50`;
  try {
    const res = await fetch(url, {headers: {Authorization: `Bearer ${accessToken}`}});
    const data = await res.json();
    appointments = (data.items || []).filter(e => e.summary && /0\d{9}/.test(e.summary)).map(parseEvent);
    renderReminders();
  } catch(err) {
    document.getElementById('reminders-app').innerHTML = '<div style="color:var(--danger);padding:20px">שגיאה בטעינת יומן</div>';
  }
}

function parseEvent(e) {
  const parts = (e.summary || '').split('|').map(s => s.trim());
  const phone = (parts[2] || '').replace(/\D/g,'');
  const desc = e.description || '';
  const bdMatch = desc.match(/תאריך לידה:\s*(\d{2}\/\d{2}\/\d{4})/);
  return { id: e.id, name: parts[0]||'', treatments: parts[1]||'', phone, birthday: bdMatch?bdMatch[1]:'', startTime: e.start?.dateTime||e.start?.date };
}

function buildReminderMsg(appt) {
  const dayStr = formatDateHE(appt.startTime);
  const timeStr = formatTime(appt.startTime);
  return `שלום ${appt.name} 😊\n\nרצינו להזכיר לך שיש לך תור ב-CABELO:\n📅 ${dayStr}\n🕐 שעה ${timeStr}\n\nלשינוי מועד התור:\n🔗 ${BOOKING_LINK}\n\nנשמח לראותך! 💛\nנא אשר/י קבלת ההודעה 🙏`;
}

function buildInactiveMsg(client) {
  return `שלום ${client.name} 😊\n\nשמנו לב שעבר זמן מאז הטיפול האחרון שלך ב-CABELO (${client.lastVisit}).\n\nנשמח לראותך שוב! ניתן לזמן תור דרך הקישור:\n🔗 ${BOOKING_LINK}\n\nמחכים לך 💛\n\nבמידה והגעת לתוצאה הרצויה וברצונך להסיר את המספר מתזכורות נוספות, אנא שלח/י את הספרה 1`;
}

function buildWALink(phone, msg) {
  let p = phone.replace(/\D/g,'');
  if (p.startsWith('0')) p = '972' + p.slice(1);
  return `https://wa.me/${p}?text=${encodeURIComponent(msg)}`;
}

function sendReminder(id, appt) {
  window.open(buildWALink(appt.phone, buildReminderMsg(appt)), '_blank');
  sentMap[id] = true;
  renderReminders();
  showToast(`✓ נפתח וואטסאפ עבור ${appt.name}`);
}

function sendInactive(idx, client) {
  window.open(buildWALink(client.phone, buildInactiveMsg(client)), '_blank');
  inactiveSentMap[idx] = true;
  updateInactiveStats();
  document.getElementById(`inactive-btn-${idx}`).className = 'btn-send sent-btn';
  document.getElementById(`inactive-btn-${idx}`).textContent = '✓ נשלח';
  document.getElementById(`inactive-card-${idx}`).classList.add('sent');
  showToast(`✓ נפתח וואטסאפ עבור ${client.name}`);
}

function renderReminders() {
  const target = getTargetDate();
  const targetStr = target.toISOString().split('T')[0];
  const sentCount = Object.keys(sentMap).length;
  let html = `
    <div class="date-row">

      <input type="date" class="date-input" value="${targetStr}" onchange="selectedDate=this.value;loadAppointments()" />

  if (appointments.length > 0) {
    html += `<div class="stats-bar">
      <div class="stat"><div class="stat-num">${appointments.length}</div><div class="stat-label">תורים</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--whatsapp)">${sentCount}</div><div class="stat-label">נשלחו</div></div>
      <div class="stat"><div class="stat-num">${appointments.length - sentCount}</div><div class="stat-label">ממתינים</div></div>
    </div>
    <div class="section-title">תורים ל${formatDateHE(target.toISOString())}</div>`;

    appointments.forEach(appt => {
      const isSent = sentMap[appt.id];
      const msg = buildReminderMsg(appt);
      html += `
        <div class="card reminder ${isSent?'sent':''}">
          <div class="card-top">
            <div class="client-name">${appt.name}</div>
            <div class="badge accent">${formatTime(appt.startTime)}</div>
          </div>
          <div class="card-meta">
            ${appt.phone ? `<span class="meta-item">📱 ${appt.phone}</span>` : ''}
            ${appt.treatments ? `<span class="meta-item">✂️ ${appt.treatments}</span>` : ''}
            ${appt.birthday ? `<span class="meta-item">🎂 ${appt.birthday}</span>` : ''}
          </div>
          <div class="msg-preview">${msg}</div>
          <button class="btn-send ${isSent?'sent-btn':''}" onclick="${isSent?'':`sendReminder('${appt.id}', appointments.find(a=>a.id==='${appt.id}'))`}">
            ${isSent ? '✓ תזכורת נשלחה' : '📲 שלח תזכורת ב-WhatsApp'}
          </button>
        </div>`;
    });
  } else {
    html += `<div class="empty-state"><div class="empty-icon">📭</div><div>אין תורים בתאריך זה</div></div>`;
  }
  document.getElementById('reminders-app').innerHTML = html;
}

// ─── TAB 2: Inactive ──────────────────────────────────────
function renderInactiveList(data) {
  let html = '';
  data.forEach((client, idx) => {
    const isSent = inactiveSentMap[idx];
    const msg = buildInactiveMsg(client);
    const daysLabel = client.daysAgo > 365 ? `${Math.floor(client.daysAgo/30)} חודשים` : `${client.daysAgo} ימים`;
    html += `
      <div class="card inactive ${isSent?'sent':''}" id="inactive-card-${idx}">
        <div class="card-top">
          <div class="client-name">${client.name}</div>
          <div class="badge danger">${daysLabel} ללא תור</div>
        </div>
        <div class="card-meta">
          ${client.phone ? `<span class="meta-item">📱 0${client.phone}</span>` : ''}
          <span class="meta-item">✂️ ${client.visits} טיפולים</span>
          <span class="meta-item">📅 ביקור אחרון: ${client.lastVisit}</span>
          ${client.birthday ? `<span class="meta-item">🎂 ${client.birthday}</span>` : ''}
        </div>
        <div class="msg-preview">${msg}</div>
        <button class="btn-send ${isSent?'sent-btn':''}" id="inactive-btn-${idx}"
          onclick="${isSent ? '' : `sendInactive(${idx}, INACTIVE_DATA[${idx}])`}">
          ${isSent ? '✓ נשלח' : '📲 שלח הודעת זימון ב-WhatsApp'}
        </button>
      </div>`;
  });
  document.getElementById('inactive-list').innerHTML = html || '<div class="empty-state"><div class="empty-icon">🎉</div><div>כל הלקוחות פעילים!</div></div>';
  updateInactiveStats();
}

function filterInactive(query) {
  if (!query) { filteredInactive = [...INACTIVE_DATA]; }
  else { filteredInactive = INACTIVE_DATA.filter(c => c.name.includes(query) || c.phone.includes(query)); }
  renderInactiveList(filteredInactive);
  document.getElementById('inactiveCount').textContent = filteredInactive.length;
}

function updateInactiveStats() {
  const sent = Object.keys(inactiveSentMap).length;
  document.getElementById('inactiveSentCount').textContent = sent;
  document.getElementById('inactivePendingCount').textContent = INACTIVE_DATA.length - sent;
  document.getElementById('inactiveBadge').textContent = INACTIVE_DATA.length - sent;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
